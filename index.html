<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTIL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aapp>

    <ahead>
      <amark>AUTIL</amark>
      <atag>100% local &middot; no data leaves your browser</atag>
    </ahead>

    <adrop id="drop">
      <alabel>Drop<br>Anything.</alabel>
      <ahint>JSON &middot; JWT &middot; CSV &middot; URL &middot; HEX &middot; BASE64 &middot; TEXT</ahint>
    </adrop>

    <amain id="main" hidden></amain>

    <afooter>
      <ainfo>Paste &middot; drag &middot; or click</ainfo>
      <astatus id="status" data-ready>READY</astatus>
    </afooter>

  </aapp>

  <script type="module" src="app.js"></script>

</body>
</html>
