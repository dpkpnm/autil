<section id="json-semantic-diff">
  <style>
    #json-semantic-diff {
      font-family: 'Courier New', Courier, monospace;
      background: #fff;
      color: #000;
      border: 1px solid #000;
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100dvh;
    }

    #json-semantic-diff * { box-sizing: border-box; margin: 0; padding: 0; }

    .jsd-header {
      padding: 16px 24px;
      border-bottom: 1px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }

    .jsd-title {
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .jsd-meta {
      font-size: 0.6rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .jsd-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #000;
    }

    .jsd-inputs > div:first-child {
      border-right: 1px solid #000;
    }

    .jsd-input-label {
      padding: 6px 12px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #000;
      color: #666;
    }

    .jsd-textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: none;
      outline: none;
      padding: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      background: #fff;
      color: #000;
      line-height: 1.4;
    }

    .jsd-textarea::placeholder {
      color: #bbb;
    }

    .jsd-actions {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #000;
    }

    .jsd-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: #000;
      color: #fff;
      border: 1px solid #000;
      padding: 6px 16px;
      cursor: pointer;
    }

    .jsd-btn:hover {
      background: #fff;
      color: #000;
    }

    .jsd-btn-ghost {
      background: #fff;
      color: #000;
    }

    .jsd-btn-ghost:hover {
      background: #000;
      color: #fff;
    }

    .jsd-stats {
      font-size: 0.6rem;
      color: #666;
      letter-spacing: 0.08em;
      display: flex;
      gap: 16px;
    }

    .jsd-stat-add  { color: #000; font-weight: bold; }
    .jsd-stat-del  { color: #000; font-weight: bold; }
    .jsd-stat-mod  { color: #000; font-weight: bold; }

    .jsd-output {
      padding: 0;
      overflow: auto;
    }

    .jsd-error {
      padding: 16px 24px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      border-left: 3px solid #000;
      margin: 16px 24px;
      background: #f0f0f0;
    }

    .jsd-error-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .jsd-empty {
      padding: 24px;
      font-size: 0.65rem;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }

    .jsd-tree {
      padding: 12px 0;
    }

    .jsd-node {
      display: flex;
      flex-direction: column;
    }

    .jsd-row {
      display: flex;
      align-items: baseline;
      gap: 0;
      padding: 1px 0;
      cursor: default;
      user-select: text;
    }

    .jsd-row:hover {
      background: #f8f8f8;
    }

    .jsd-row.added    { background: #e8e8e8; }
    .jsd-row.deleted  { background: #e8e8e8; text-decoration: line-through; color: #666; }
    .jsd-row.modified { background: #f0f0f0; }
    .jsd-row.added:hover    { background: #ddd; }
    .jsd-row.deleted:hover  { background: #ddd; }
    .jsd-row.modified:hover { background: #e8e8e8; }

    .jsd-row-marker {
      width: 20px;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.7rem;
      font-weight: bold;
      color: #666;
      padding-left: 4px;
    }

    .jsd-row.added    .jsd-row-marker { color: #000; }
    .jsd-row.deleted  .jsd-row-marker { color: #666; }
    .jsd-row.modified .jsd-row-marker { color: #000; }

    .jsd-indent {
      flex-shrink: 0;
    }

    .jsd-toggle {
      width: 14px;
      flex-shrink: 0;
      cursor: pointer;
      font-size: 0.65rem;
      color: #999;
      text-align: center;
      user-select: none;
    }

    .jsd-toggle:hover { color: #000; }

    .jsd-key {
      font-size: 0.72rem;
      color: #000;
      white-space: nowrap;
    }

    .jsd-colon {
      font-size: 0.72rem;
      color: #666;
      margin: 0 4px;
    }

    .jsd-val {
      font-size: 0.72rem;
      word-break: break-all;
    }

    .jsd-val.type-string  { color: #333; }
    .jsd-val.type-number  { color: #000; font-weight: bold; }
    .jsd-val.type-boolean { color: #000; font-style: italic; }
    .jsd-val.type-null    { color: #999; }

    .jsd-val-old {
      text-decoration: line-through;
      color: #999;
      margin-right: 6px;
    }

    .jsd-val-arrow {
      color: #666;
      margin: 0 4px;
      font-size: 0.65rem;
    }

    .jsd-val-new {
      font-weight: bold;
    }

    .jsd-children {
      display: block;
    }

    .jsd-children.collapsed {
      display: none;
    }

    .jsd-bracket {
      font-size: 0.72rem;
      color: #666;
    }

    .jsd-summary {
      font-size: 0.6rem;
      color: #999;
      margin-left: 4px;
      letter-spacing: 0.04em;
    }

    .autil-offline {
      padding: 16px 24px;
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>

  <div class="jsd-header">
    <span class="jsd-title">JSON Semantic Diff</span>
    <span class="jsd-meta">100% local &mdash; no data leaves your browser</span>
  </div>

  <div class="jsd-inputs">
    <div>
      <div class="jsd-input-label">Input A &mdash; base</div>
      <textarea class="jsd-textarea" id="jsd-input-a" placeholder='{ "key": "value" }'></textarea>
    </div>
    <div>
      <div class="jsd-input-label">Input B &mdash; target</div>
      <textarea class="jsd-textarea" id="jsd-input-b" placeholder='{ "key": "changed" }'></textarea>
    </div>
  </div>

  <div class="jsd-actions">
    <button class="jsd-btn" id="jsd-run">Compare</button>
    <button class="jsd-btn jsd-btn-ghost" id="jsd-clear">Clear</button>
    <div class="jsd-stats" id="jsd-stats" style="display:none">
      <span><span class="jsd-stat-add" id="jsd-count-add">0</span> added</span>
      <span><span class="jsd-stat-del" id="jsd-count-del">0</span> deleted</span>
      <span><span class="jsd-stat-mod" id="jsd-count-mod">0</span> modified</span>
    </div>
  </div>

  <div class="jsd-output" id="jsd-output">
    <div class="jsd-empty">Paste two JSON payloads above and click Compare</div>
  </div>

  <script>
    (function () {
      if (!window.AUTIL_FLAGS?.JSON_SEMANTIC_DIFF) {
        document.getElementById('json-semantic-diff').innerHTML = '<p class="autil-offline">Tool offline.</p>';
        return;
      }

      const inputA  = document.getElementById('jsd-input-a');
      const inputB  = document.getElementById('jsd-input-b');
      const btnRun  = document.getElementById('jsd-run');
      const btnClear= document.getElementById('jsd-clear');
      const output  = document.getElementById('jsd-output');
      const stats   = document.getElementById('jsd-stats');
      const cntAdd  = document.getElementById('jsd-count-add');
      const cntDel  = document.getElementById('jsd-count-del');
      const cntMod  = document.getElementById('jsd-count-mod');

      let totals = { added: 0, deleted: 0, modified: 0 };

      // ── Semantic diff engine ──────────────────────────────────────────────

      function typeOf(v) {
        if (v === null) return 'null';
        if (Array.isArray(v)) return 'array';
        return typeof v;
      }

      // Returns a diff tree. Each node:
      // { status: 'same'|'added'|'deleted'|'modified', key, valA, valB, type, children }
      function diff(a, b, key) {
        const ta = typeOf(a);
        const tb = typeOf(b);

        if (ta !== tb) {
          return { status: 'modified', key, valA: a, valB: b, typeA: ta, typeB: tb, children: null };
        }

        if (ta === 'object') {
          const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
          const children = [];
          let hasChange = false;
          for (const k of keys) {
            const inA = Object.prototype.hasOwnProperty.call(a, k);
            const inB = Object.prototype.hasOwnProperty.call(b, k);
            let child;
            if (!inA) {
              child = markAll(b[k], k, 'added');
              hasChange = true;
            } else if (!inB) {
              child = markAll(a[k], k, 'deleted');
              hasChange = true;
            } else {
              child = diff(a[k], b[k], k);
              if (child.status !== 'same') hasChange = true;
            }
            children.push(child);
          }
          return { status: hasChange ? 'modified' : 'same', key, valA: a, valB: b, type: 'object', children };
        }

        if (ta === 'array') {
          const len = Math.max(a.length, b.length);
          const children = [];
          let hasChange = false;
          for (let i = 0; i < len; i++) {
            let child;
            if (i >= a.length) {
              child = markAll(b[i], i, 'added');
              hasChange = true;
            } else if (i >= b.length) {
              child = markAll(a[i], i, 'deleted');
              hasChange = true;
            } else {
              child = diff(a[i], b[i], i);
              if (child.status !== 'same') hasChange = true;
            }
            children.push(child);
          }
          return { status: hasChange ? 'modified' : 'same', key, valA: a, valB: b, type: 'array', children };
        }

        // Primitive
        if (a === b) {
          return { status: 'same', key, valA: a, valB: b, type: ta, children: null };
        }
        return { status: 'modified', key, valA: a, valB: b, typeA: ta, typeB: tb, children: null };
      }

      function markAll(v, key, status) {
        const t = typeOf(v);
        if (t === 'object') {
          return {
            status,
            key,
            valA: status === 'deleted' ? v : undefined,
            valB: status === 'added'   ? v : undefined,
            type: 'object',
            children: Object.keys(v).map(k => markAll(v[k], k, status))
          };
        }
        if (t === 'array') {
          return {
            status,
            key,
            valA: status === 'deleted' ? v : undefined,
            valB: status === 'added'   ? v : undefined,
            type: 'array',
            children: v.map((item, i) => markAll(item, i, status))
          };
        }
        return { status, key, valA: v, valB: v, type: t, children: null };
      }

      // ── Count totals ──────────────────────────────────────────────────────

      function countNode(node, acc) {
        if (node.children) {
          node.children.forEach(c => countNode(c, acc));
        } else {
          if (node.status === 'added')    acc.added++;
          if (node.status === 'deleted')  acc.deleted++;
          if (node.status === 'modified') acc.modified++;
        }
      }

      // ── Rendering ─────────────────────────────────────────────────────────

      function valSpan(v, cls) {
        const t = typeOf(v);
        const span = document.createElement('span');
        span.className = `jsd-val type-${t}${cls ? ' ' + cls : ''}`;
        if (t === 'string') span.textContent = JSON.stringify(v);
        else if (t === 'null') span.textContent = 'null';
        else span.textContent = String(v);
        return span;
      }

      function renderNode(node, depth, isLast, parentContainer) {
        const wrapper = document.createElement('div');
        wrapper.className = 'jsd-node';

        const row = document.createElement('div');
        row.className = 'jsd-row';
        if (node.status === 'added')    row.classList.add('added');
        if (node.status === 'deleted')  row.classList.add('deleted');
        if (node.status === 'modified' && !node.children) row.classList.add('modified');

        // Marker column
        const marker = document.createElement('span');
        marker.className = 'jsd-row-marker';
        if (node.status === 'added')    marker.textContent = '+';
        else if (node.status === 'deleted')  marker.textContent = '−';
        else if (node.status === 'modified' && !node.children) marker.textContent = '~';
        else marker.textContent = ' ';
        row.appendChild(marker);

        // Indentation
        const indent = document.createElement('span');
        indent.className = 'jsd-indent';
        indent.style.width = (depth * 16) + 'px';
        indent.style.display = 'inline-block';
        row.appendChild(indent);

        // Toggle (for objects/arrays)
        const toggle = document.createElement('span');
        toggle.className = 'jsd-toggle';
        row.appendChild(toggle);

        // Key
        if (node.key !== undefined && node.key !== null && node.key !== '__root__') {
          const keyEl = document.createElement('span');
          keyEl.className = 'jsd-key';
          keyEl.textContent = typeof node.key === 'number' ? `[${node.key}]` : `"${node.key}"`;
          row.appendChild(keyEl);
          const colon = document.createElement('span');
          colon.className = 'jsd-colon';
          colon.textContent = ':';
          row.appendChild(colon);
        }

        const childrenEl = document.createElement('div');
        childrenEl.className = 'jsd-children';

        if (node.children) {
          const isObj = node.type === 'object';
          const openBr = document.createElement('span');
          openBr.className = 'jsd-bracket';
          openBr.textContent = isObj ? '{' : '[';
          row.appendChild(openBr);

          // Summary count when collapsed
          const summary = document.createElement('span');
          summary.className = 'jsd-summary';
          summary.style.display = 'none';
          summary.textContent = isObj
            ? `${node.children.length} key${node.children.length !== 1 ? 's' : ''}`
            : `${node.children.length} item${node.children.length !== 1 ? 's' : ''}`;
          row.appendChild(summary);

          const closingRow = document.createElement('div');
          closingRow.className = 'jsd-row';
          const closingMarker = document.createElement('span');
          closingMarker.className = 'jsd-row-marker';
          closingMarker.textContent = ' ';
          const closingIndent = document.createElement('span');
          closingIndent.className = 'jsd-indent';
          closingIndent.style.width = (depth * 16) + 'px';
          closingIndent.style.display = 'inline-block';
          const closingTogglePad = document.createElement('span');
          closingTogglePad.style.width = '14px';
          closingTogglePad.style.display = 'inline-block';
          const closeBr = document.createElement('span');
          closeBr.className = 'jsd-bracket';
          closeBr.textContent = isObj ? '}' : ']';
          closingRow.appendChild(closingMarker);
          closingRow.appendChild(closingIndent);
          closingRow.appendChild(closingTogglePad);
          closingRow.appendChild(closeBr);

          node.children.forEach((child, i) => {
            renderNode(child, depth + 1, i === node.children.length - 1, childrenEl);
          });

          wrapper.appendChild(row);
          wrapper.appendChild(childrenEl);
          wrapper.appendChild(closingRow);

          // Toggle expand/collapse
          let collapsed = false;
          toggle.textContent = '▾';
          toggle.style.cursor = 'pointer';

          toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            collapsed = !collapsed;
            if (collapsed) {
              childrenEl.classList.add('collapsed');
              closingRow.style.display = 'none';
              toggle.textContent = '▸';
              summary.style.display = '';
            } else {
              childrenEl.classList.remove('collapsed');
              closingRow.style.display = '';
              toggle.textContent = '▾';
              summary.style.display = 'none';
            }
          });
        } else {
          toggle.textContent = ' ';
          // Primitive value rendering
          if (node.status === 'modified') {
            row.appendChild(valSpan(node.valA, 'jsd-val-old'));
            const arrow = document.createElement('span');
            arrow.className = 'jsd-val-arrow';
            arrow.textContent = '→';
            row.appendChild(arrow);
            row.appendChild(valSpan(node.valB, 'jsd-val-new'));
          } else if (node.status === 'added') {
            row.appendChild(valSpan(node.valB));
          } else if (node.status === 'deleted') {
            row.appendChild(valSpan(node.valA));
          } else {
            row.appendChild(valSpan(node.valA));
          }
          wrapper.appendChild(row);
        }

        parentContainer.appendChild(wrapper);
      }

      // ── Main run ──────────────────────────────────────────────────────────

      function run() {
        const rawA = inputA.value.trim();
        const rawB = inputB.value.trim();

        if (!rawA && !rawB) {
          output.innerHTML = '<div class="jsd-empty">Paste two JSON payloads above and click Compare</div>';
          stats.style.display = 'none';
          return;
        }

        let a, b;
        const errors = [];

        try { a = JSON.parse(rawA); } catch(e) { errors.push(`Input A: ${e.message}`); }
        try { b = JSON.parse(rawB); } catch(e) { errors.push(`Input B: ${e.message}`); }

        if (errors.length) {
          output.innerHTML = '';
          errors.forEach(msg => {
            const err = document.createElement('div');
            err.className = 'jsd-error';
            const label = document.createElement('div');
            label.className = 'jsd-error-label';
            label.textContent = 'Parse Error';
            const text = document.createElement('div');
            text.textContent = msg;
            err.appendChild(label);
            err.appendChild(text);
            output.appendChild(err);
          });
          stats.style.display = 'none';
          return;
        }

        const tree = diff(a, b, '__root__');

        totals = { added: 0, deleted: 0, modified: 0 };
        countNode(tree, totals);

        cntAdd.textContent = totals.added;
        cntDel.textContent = totals.deleted;
        cntMod.textContent = totals.modified;
        stats.style.display = 'flex';

        output.innerHTML = '';

        if (totals.added === 0 && totals.deleted === 0 && totals.modified === 0) {
          output.innerHTML = '<div class="jsd-empty">Inputs are semantically identical</div>';
          return;
        }

        const tree2 = document.createElement('div');
        tree2.className = 'jsd-tree';

        if (tree.children) {
          tree.children.forEach((child, i) => {
            renderNode(child, 0, i === tree.children.length - 1, tree2);
          });
        } else {
          renderNode(tree, 0, true, tree2);
        }

        output.appendChild(tree2);
      }

      function clear() {
        inputA.value = '';
        inputB.value = '';
        output.innerHTML = '<div class="jsd-empty">Paste two JSON payloads above and click Compare</div>';
        stats.style.display = 'none';
      }

      btnRun.addEventListener('click', run);
      btnClear.addEventListener('click', clear);

      inputA.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) run(); });
      inputB.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) run(); });
    })();
  </script>
</section>
